; pico-esc-tool — PlatformIO project
; RP2040 (Pico / Pico W), earlephilhower Arduino-Pico core (wraps the Pico SDK + PIO).
; Serial = USB-C CDC by default (host link for esctool).
;
; The DEFAULT build is the tool (env:esc_tool, Pico W): `pio run` / `-t upload` target it via
; default_envs below. Build it explicitly with:  pio run -e esc_tool
; Hardware wiring (signal pins, mode pin, Wi-Fi, motor) lives in src/apps/esc_config.h.
;
; FLASHING gotcha: `-t upload` resets the board via a 1200bps touch on the USB CDC port,
; so a serial monitor holding that port makes the reset fail to reach BOOTSEL ("認識されず
; 書き込めない"). CLOSE the monitor before uploading — simplest is one command so the port
; is never double-held:  pio run -e esc_tool -t upload -t monitor
; (Board auto-detects by USB VID 2E8A; the COM number changes on each reset.)
; Full method + optional wrapper: data lake knowledge/embedded (pico-flash-port-lock).

[platformio]
default_envs = main

; Shared base for every env. The DEFAULT build target is the tool (esc_tool); the demo and the
; spikes each override build_src_filter to select their own single entry point from src/apps/ (so
; they never collide on setup()/loop()). Board defaults to Pico W — the tool needs its Wi-Fi.
[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
framework = arduino
board = rpipicow
board_build.core = earlephilhower
monitor_speed = 115200
; RP2040 has 2 PIO blocks; pico-bidir-dshot uses them for DShot TX + bidir RX.
build_flags = -DNUM_PIOS=2
; Bidirectional DShot + Extended DShot Telemetry (GPL-3.0). Pinned to the main branch
; (repo publishes no v* git tags; matches the earlier Dshot_Pico setup).
lib_deps =
	https://github.com/bastian2001/pico-bidir-dshot.git#main
build_src_filter = +<apps/esc_tool.cpp>

; --- DEFAULT build: the integrated object-oriented firmware (src/main.cpp). ONE build folds together
;     config/flash + DShot drive (RAW thrust/throttle OR RPM closed-loop velocity) + USB-serial CLI +
;     (SETUP mode) Wi-Fi web UI. Composed of objects: EscManager owns one Thruster per ESC. Inherits
;     [env] (board rpipicow for Wi-Fi). This replaces the per-app model; the others are fallbacks. ---
[env:main]
build_src_filter = +<main.cpp>
; LittleFS partition for the on-device firmware library (uploaded .hex files persist here).
board_build.filesystem_size = 256k

; --- LEGACY fallback tool: config/flash ESCs + DShot spin, over USB serial and (in SETUP mode) a
;     Wi-Fi web UI. Superseded by env:main (which also adds RPM velocity control); kept building as a
;     known-good fallback. Inherits everything from [env]. ---
[env:esc_tool]
; LittleFS partition for the on-device firmware library (uploaded .hex files persist here).
board_build.filesystem_size = 256k

; Legacy bring-up apps (dshot_demo, encoder_test, spike_setup/flash/boot/program/write) were archived
; on branch `archive/legacy-apps` (2026-07-17) and removed here — the integrated `main` firmware
; supersedes them. Recover with:  git checkout archive/legacy-apps -- src/apps/<name>.cpp
