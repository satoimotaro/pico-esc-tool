; ESC-controller (thrust-controller) — PlatformIO project
; RP2040 (Pico / Pico W), earlephilhower Arduino-Pico core (wraps the Pico SDK + PIO).
; Serial = USB-C CDC by default (Phase-1 host link).
;
; Build/flash on Windows PlatformIO (works over \\wsl$\...\ESC-controller),
; or install PlatformIO Core in WSL for a compile check.
;
; Actual board = Pico W (rpipicow). `pio run` / `-t upload` default to it via
; default_envs below; the spike envs already target rpipicow.

[platformio]
default_envs = picow

[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200
; RP2040 has 2 PIO blocks; pico-bidir-dshot uses them for DShot TX + bidir RX.
build_flags = -DNUM_PIOS=2
; Bidirectional DShot + Extended DShot Telemetry (GPL-3.0). Pin a release for reproducibility.
lib_deps =
	https://github.com/bastian2001/pico-bidir-dshot.git#v1.0.2
; Default: build only the DShot app. Each env below selects its own entry point so
; the app and the spikes don't collide on setup()/loop().
build_src_filter = +<main.cpp>

; --- DShot control app (A0 baseline) ---
[env:pico]
board = rpipico

; Pico W (matches the earlier Dshot_Pico bring-up hardware).
[env:picow]
board = rpipicow

; --- A0 spikes: BLHeli-S 1-wire bootloader (no DShot lib needed) ---
[env:spike_flash]
board = rpipicow
build_src_filter = +<apps/spike_flash.cpp>
; lib_deps =

[env:spike_setup]
board = rpipicow
build_src_filter = +<apps/spike_setup.cpp>
; lib_deps =
