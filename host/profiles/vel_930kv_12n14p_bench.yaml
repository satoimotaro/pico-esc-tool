# BENCH-MEASURED on real 930KV 12N14P (2026-07-16), S2 sine region only, no crossover.
# Sensorless FF validated: velctl --rpm 50 -> command 149 -> measured ~50 RPM (mean).
# Low-speed partial curve (<=84 RPM); extend / add crossover with a fuller supervised velcal run.
#
# control: CLOSED-LOOP GAINS bench-verified on this motor's 6-step range (2026-07-17). The 930KV
# plant gain is ~23 mech RPM per command-unit (cmd 620->2576, 900->9447 mech), ~30x the sim's ~0.8,
# so the sim DEFAULT_GAINS (kp0.4/ki1.5) saturate the trim rail here — these are the correct values.
# Verified: mis-scaled FF (x1.3) that pure-FF missed by 22.7% was driven to 0.0% by the PI. (The
# curve above is sine-only, so a full 6-step velcal profile should carry the same block.)
motor: 930kv_12n14p
pole_pairs: 7
source: bench
control:
  kp: 0.03
  ki: 0.12
  trim_max: 400.0
  blend_secs: 0.3
points:
- thrust: 0.0
  rpm: 0.0
- thrust: 60.0
  rpm: 20.27
- thrust: 108.0
  rpm: 35.57
- thrust: 155.0
  rpm: 51.76
- thrust: 202.0
  rpm: 67.63
- thrust: 250.0
  rpm: 83.55
