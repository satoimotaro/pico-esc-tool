name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO + test deps
        run: pip install platformio pyserial pytest pyyaml

      - name: Build all firmware environments
        run: pio run -e main -e esc_tool

      - name: Compile-check the host tools
        run: python -m compileall -q host

      - name: Run host unit tests
        run: python -m pytest host/tests -q
