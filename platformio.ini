; ESC-controller — PlatformIO project
; RP2040 (Pico / Pico W), earlephilhower Arduino-Pico core (wraps the Pico SDK + PIO).
; Serial = USB-C CDC by default (host link for esctool).
;
; Board = Pico W (rpipicow). `pio run` / `-t upload` default to it via default_envs below;
; the spike envs already target rpipicow. Build the host tool with:  pio run -e esc_host
;
; FLASHING gotcha: `-t upload` resets the board via a 1200bps touch on the USB CDC port,
; so a serial monitor holding that port makes the reset fail to reach BOOTSEL ("認識されず
; 書き込めない"). CLOSE the monitor before uploading — simplest is one command so the port
; is never double-held:  pio run -e spike_setup -t upload -t monitor
; (Board auto-detects by USB VID 2E8A; the COM number changes on each reset.)
; Full method + optional wrapper: data lake knowledge/embedded (pico-flash-port-lock).

[platformio]
default_envs = picow

; --- Unified host-driven firmware (esc_host): one build the PC-side CLI (host/esctool.py) drives
;     over USB-CDC serial to scan/read/write/flash ESCs. Replaces the one-off spikes going forward.
[env:esc_host]
board = rpipicow
build_src_filter = +<apps/esc_host.cpp>
; inherits pico-bidir-dshot from [env] (DShot-primed bootloader entry)

; --- Wi-Fi web configurator (Pico W): AP + HTTP server + browser UI, on the shared esc_session.
;     Connect to the "pico-esc-tool" Wi-Fi and open http://192.168.4.1 ---
[env:esc_web]
board = rpipicow
build_src_filter = +<apps/esc_web.cpp>
; inherits pico-bidir-dshot from [env]; WiFi/WebServer come from the Arduino-Pico core

[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200
; RP2040 has 2 PIO blocks; pico-bidir-dshot uses them for DShot TX + bidir RX.
build_flags = -DNUM_PIOS=2
; Bidirectional DShot + Extended DShot Telemetry (GPL-3.0). Pinned to the main branch
; (repo publishes no v* git tags; matches the earlier Dshot_Pico setup).
lib_deps =
	https://github.com/bastian2001/pico-bidir-dshot.git#main
; Default: build only the DShot app. Each env below selects its own entry point so
; the app and the spikes don't collide on setup()/loop().
build_src_filter = +<main.cpp>

; --- DShot control app (A0 baseline) ---
[env:pico]
board = rpipico

; Pico W (matches the earlier Dshot_Pico bring-up hardware).
[env:picow]
board = rpipicow

; --- A0 spikes: BLHeli-S 1-wire bootloader (DShot-primed signal-loss entry) ---
[env:spike_flash]
board = rpipicow
build_src_filter = +<apps/spike_flash.cpp>
; inherits pico-bidir-dshot from [env] (same DShot-prime -> signal-loss entry as spike_setup)

[env:spike_setup]
board = rpipicow
build_src_filter = +<apps/spike_setup.cpp>
; inherits pico-bidir-dshot from [env]: this spike primes the ESC with DShot,
; then stops it (signal loss) to trigger BLHeli_S init_no_signal bootloader entry.

; --- Diagnostic: pure BootInit hammer, NO DShot. Isolates the 1-wire transport from the
;     DShot-primed entry. Flash it, open monitor, then POWER-CYCLE the ESC repeatedly. ---
[env:spike_boot]
board = rpipicow
build_src_filter = +<apps/spike_boot.cpp>
lib_deps =            ; no DShot needed here; override [env] to drop pico-bidir-dshot

; --- A1 spike: FLASH WRITER. Same entry, then 'Y'-gated erase+program+verify of the
;     firmware image in lib/esc_flash/firmware_hex.h (fill it with BLHeli-S 16.7 first). ---
[env:spike_program]
board = rpipicow
build_src_filter = +<apps/spike_program.cpp>
; inherits pico-bidir-dshot from [env]

; --- A1 spike: CONFIG WRITE (change one setting, e.g. beep/startup volume). Same DShot-primed
;     entry, reads the 512B config page, changes one byte, and (only if ARM_WRITE=1 in the source)
;     erases+writes it back with read-back verify. Default is DRY-RUN (writes nothing). ---
[env:spike_write]
board = rpipicow
build_src_filter = +<apps/spike_write.cpp>
; inherits pico-bidir-dshot from [env]
