; ESC-controller (thrust-controller) — PlatformIO project
; RP2040 (Pico / Pico W), earlephilhower Arduino-Pico core (wraps the Pico SDK + PIO).
; Serial = USB-C CDC by default (Phase-1 host link).
;
; Build/flash on Windows PlatformIO (works over \\wsl$\...\ESC-controller),
; or install PlatformIO Core in WSL for a compile check.

[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200
; RP2040 has 2 PIO blocks; pico-bidir-dshot uses them for DShot TX + bidir RX.
build_flags = -DNUM_PIOS=2
; Bidirectional DShot + Extended DShot Telemetry (GPL-3.0). Pin a release for reproducibility.
lib_deps =
	https://github.com/bastian2001/pico-bidir-dshot.git#v1.0.2

; Plain Pico (default — no wireless needed for the base controller).
[env:pico]
board = rpipico

; Pico W (matches the earlier Dshot_Pico bring-up hardware).
[env:picow]
board = rpipicow
